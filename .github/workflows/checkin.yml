name: A自动签到

on:
  schedule:
    - cron: '15 16 * * *'
    - cron: '0 22 * * *'
    - cron: '0 0 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
      with:
          fetch-depth: 0

    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Check permissions
      run: |
        if ! gh workflow enable sync.yml >/dev/null 2>&1; then
          exit 1
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 随机延迟
      run: sleep $((RANDOM % 180))
        
    - name: 运行签到
      env:
        ACCOUNTS: ${{ secrets.ACCOUNTS }}
      run: python main.py
      
    - name: Empty commit
      run: |
        git config user.name "github-actions" >/dev/null 2>&1
        git config user.email "github-actions@github.com" >/dev/null 2>&1
        git commit --allow-empty -m "chore: keepalive" >/dev/null 2>&1
        git pull --quiet origin main >/dev/null 2>&1
        git push --quiet origin main >/dev/null 2>&1
